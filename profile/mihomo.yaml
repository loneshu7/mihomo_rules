            🔶自动选择, 🔷自动选择, 
            🇭🇰手动选择, 🇸🇬手动选择, 
            🇺🇸手动选择, 🇹🇼手动选择,
            🇯🇵手动选择, 🇰🇷手动选择, 
            🇦🇺手动选择, 🇬🇧手动选择, 
            🇫🇷手动选择, 🇩🇪手动选择, 
            🇭🇰自动选择, 🇭🇰故障转移, 
            🇸🇬自动选择, 🇸🇬故障转移, 
            🇺🇸自动选择, 🇺🇸故障转移,  
            🇹🇼自动选择, 🇹🇼故障转移, 
            🇯🇵自动选择, 🇯🇵故障转移, 
            🇰🇷自动选择, 🇰🇷故障转移, 
